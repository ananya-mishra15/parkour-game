<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Parkour Game</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="game-wrap">
    <canvas id="game" width="960" height="540"></canvas>
    <div id="hud">
      <div id="level-name">Loading...</div>
      <div id="hint">← → move &nbsp;·&nbsp; Space jump (x2) &nbsp;·&nbsp; Shift slide &nbsp;·&nbsp; R restart &nbsp;·&nbsp; Shift+R reset save</div>
    </div>
    <div id="touch-controls" style="display:none">
      <div id="touch-left" class="touch-zone" aria-label="Move left">
        <span class="touch-label">&#9664;</span>
      </div>
      <div id="touch-right" class="touch-zone" aria-label="Move right">
        <span class="touch-label">&#9654;</span>
      </div>
      <div id="touch-jump" class="touch-zone" aria-label="Jump">
        <span class="touch-label">JUMP</span>
      </div>
      <button id="touch-restart" aria-label="Restart">&#8634;</button>
    </div>
  </div>

  <div id="rotate-prompt">
    <div id="rotate-inner">Rotate your device to landscape</div>
  </div>

  <script src="js/input.js"></script>
  <script src="js/physics.js"></script>
  <script src="js/levels.js"></script>
  <script src="js/level.js"></script>
  <script src="js/player.js"></script>
  <script src="js/camera.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/save.js"></script>
  <script src="js/touch.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
